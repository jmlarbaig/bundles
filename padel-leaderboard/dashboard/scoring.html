<!DOCTYPE html>
<html lang="en">

<head>
	<!-- Required meta tags -->
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Overlay Panel</title>

	<!-- JQUERY -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

	<!-- Latest compiled and minified CSS -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css"
		integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">

	<!-- Optional theme -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap-theme.min.css"
		integrity="sha384-6pzBo3FDv/PJ8r2KRkGHifhEocL+1X2rVCTTkUfGk7/0pbek5mMa1upzvWbrUbOZ" crossorigin="anonymous">

	<!-- Latest compiled and minified JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"
		integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd"
		crossorigin="anonymous"></script>


	<link rel="stylesheet" href="css/index.css">

</head>

<body>
	<div>
		<div class="box">
			<div class="col">
				<h3>Items Overlay</h3>
				<div class='col' id="checkboxLeaderboard">
					<div class="input-form">
						<label for="logo">Event Logo</label>
						<input type="checkbox" class="checkbox" id="box_logo" />
					</div>
					<div class="input-form">
						<label for="chrono">Chrono</label>
						<input type="checkbox" class="checkbox" id="box_chrono" />
					</div>
					<div class="input-form">
						<label for="leaderboards">Leaderboard</label>
						<input type="checkbox" class="checkbox" id="leaderboards" />
					</div>
					<div class="input-form">
						<label for="wod">Lowerthird</label>
						<input type="checkbox" class="checkbox" id="lowerthird" />
					</div>
					<div class="input">
						<label for="mainSponsorSelect">Main Sponsor</label>
						<select type="select" id="mainSponsorSelect">
							<option value="">No sponsor uploaded</option>
						</select>
					</div>
				</div><button type="button" id="actualiser" class="button-50" onclick="actualiser()"> ACTUALISER
				</button>

			</div>

			<div class='col'>
				<div class="boxAths">
					<div class="boxNames">
						<h3>ATHLETE UPPER</h3>
						<div class="boxName">
							<h3>Name 1</h3>
							<input type="text" id="nameA1" required>
						</div>
						<div class="boxName">
							<h3>Name 2</h3>
							<input type="text" id="nameA2" required>
						</div>
					</div>
					<div class="boxSet">
						<h3>SET 1</h3>
						<button id="plussetA1">+</button>
						<div class="setLabel" id="setA1">0</div>
						<button id="minussetA1">-</button>
					</div>
					<div class="boxSet">
						<h3>SET 2</h3>
						<button id="plussetA2">+</button>
						<div class="setLabel" id="setA2">0</div>
						<button id="minussetA2">-</button>
					</div>
					<div class="boxSet">
						<h3>SET 3</h3>
						<button id="plussetA3">+</button>
						<div class="setLabel" id="setA3">0</div>
						<button id="minussetA3">-</button>
					</div>
					<div class="boxPoint">
						<h3>POINT</h3>
						<button id="pluspointA">+</button>
						<div class="setLabel" id="pointA">0</div>
						<button id="minuspointA">-</button>
					</div>
				</div>
				<hr />
				<div class="boxAths" id="lowerAth">
					<div class="boxNames">
						<h3>ATHLETE LOWER</h3>
						<div class="boxName">
							<h3>Name 1</h3>
							<input type="text" id="nameB1" required>
						</div>
						<div class="boxName">
							<h3>Name 2</h3>
							<input type="text" id="nameB2" required>
						</div>
					</div>
					<div class="boxSet">
						<h3>SET 1</h3>
						<button id="plussetB1">+</button>
						<div class="setLabel" id="setB1">0</div>
						<button id="minussetB1">-</button>
					</div>
					<div class="boxSet">
						<h3>SET 2</h3>
						<button id="plussetB2">+</button>
						<div class="setLabel" id="setB2">0</div>
						<button id="minussetB2">-</button>
					</div>
					<div class="boxSet">
						<h3>SET 3</h3>
						<button id="plussetB3">+</button>
						<div class="setLabel" id="setB3">0</div>
						<button id="minussetB3">-</button>
					</div>
					<div class="boxPoint">
						<h3>POINT</h3>
						<button id="pluspointB">+</button>
						<div class="setLabel" id="pointB">0</div>
						<button id="minuspointB">-</button>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="./js/timer.js" type="text/javascript"></script>
	<script src="./js/tools.js" type="text/javascript"></script>
	<script src="./index.js" type="text/javascript"></script>

</body>

</html>
