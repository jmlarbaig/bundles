<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <!-- JQUERY -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>

    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css"
        integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">

    <!-- Optional theme -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap-theme.min.css"
        integrity="sha384-6pzBo3FDv/PJ8r2KRkGHifhEocL+1X2rVCTTkUfGk7/0pbek5mMa1upzvWbrUbOZ" crossorigin="anonymous">

    <!-- Latest compiled and minified JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"
        integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd"
        crossorigin="anonymous"></script>


    <title>Leaderboard</title>
    <link rel="stylesheet" href="css/header/header.css">
    <link rel="stylesheet" href="css/leaderboard/leaderboard.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/video.css">


    <script src="./js/tools.js" type="text/javascript"></script>
    <script src="./js/time.js" type="text/javascript"></script>


</head>

<body class="screen">

    <div class="flex-container">
        <div class="flex-item video-content">
            <video id="video" autoplay muted>
                <source id="sourceVid" src="" type="video/mp4">
            </video>
        </div>
    </div>


    <div class="header">

        <div class="box_logo">
            <div class="logo" id="logo">
            </div>
        </div>

        <div class="box_chrono">
            <div id="chrono" class="chrono">00:00</div>
        </div>

    </div>

    <div class="leaderboards" id="leaderboards">
        <div class="boxAth" id="upperAth">
            <div class="AthletesName">
                <div class="nameAth" id="nameA1">

                </div>
                <div class="nameAth" id="nameA2">

                </div>
            </div>
            <div class="boxShadow">
                <div class="set" id="setA1">

                </div>
                <div class="set" id="setA2">

                </div>
                <div class="set" id="setA3">

                </div>
                <div class="point" id="pointA">

                </div>
            </div>
        </div>
        <div class="boxAth" id="lowerAth">
            <div class="AthletesName">
                <div class="nameAth" id="nameB1">

                </div>
                <div class="nameAth" id="nameB2">

                </div>
            </div>
            <div class="boxShadow">
                <div class="set" id="setB1">

                </div>
                <div class="set" id="setB2">

                </div>
                <div class="set" id="setB3">

                </div>
                <div class="point" id="pointB">

                </div>
            </div>
        </div>
    </div>


    <div class="sponsorLogo" id="sponsorLogo"></div>

    <script src="./index.js" type="text/javascript"></script>

</body>

</html>
