<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Configuration Dashboard</title>
	<link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&display=swap">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
	<link rel="stylesheet" href="/bundles/configuration/dashboard/css/configuration.css">
	<script src="/bundles/configuration/dashboard/js/configuration.js"></script>
</head>

<body>

	<div class="shell">

		<!-- TOPBAR -->
		<header class="topbar">
			<div class="topbar-logo">CFG<span>/</span>PANEL</div>
			<div class="topbar-sep"></div>

			<div class="dash-selector-wrap">
				<span class="dash-label">Overlay</span>
				<select id="dashboard-select">
					<option value="">— select —</option>
				</select>
			</div>

			<div class="status-pill">
				<div class="status-dot"></div>
				<span>LIVE</span>
			</div>

			<div class="topbar-actions">
				<button class="btn btn-danger" onclick="resetConfig()">RESET</button>
				<button class="btn" onclick="exportConfig()">EXPORT</button>
				<button class="btn btn-save" onclick="Actualiser()">APPLY</button>
			</div>
		</header>

		<!-- SIDEBAR -->
		<nav class="sidebar" id="sidebar">
			<div class="empty-state" style="height:100%">
				<div class="empty-icon">⬡</div>
				<span>Select an overlay</span>
			</div>
		</nav>

		<!-- MAIN -->
		<main class="main" id="main">
			<div class="empty-state">
				<div class="empty-icon">◈</div>
				<span>No overlay selected</span>
			</div>
		</main>

	</div>

	<!-- Bottom bar -->
	<div class="bottombar">
		<div class="bar-item">
			<div class="bar-dot"></div>
			<span>NODECG</span>
		</div>
		<div class="bar-item">
			<span id="bar-changes">0 changes</span>
		</div>
		<div class="bar-item" style="margin-left:auto">
			<span id="bar-section">—</span>
		</div>
	</div>

	<!-- Toast -->
	<div class="toast" id="toast"></div>

	<!-- Add Parameter Modal -->
	<div id="param-modal" class="modal">
		<div class="modal-content">
			<div class="modal-header">
				<h3>Add New Parameter</h3>
				<button class="modal-close" onclick="closeModal()">×</button>
			</div>
			<form id="param-form">
				<div class="form-group">
					<label for="param-name">Parameter Name</label>
					<input type="text" id="param-name" placeholder="e.g., background-color-header" required>
					<small>Will generate CSS variable: --parameter-name</small>
				</div>
				<div class="form-group">
					<label for="param-title">Display Title</label>
					<input type="text" id="param-title" placeholder="e.g., Header Background Color" required>
				</div>
				<div class="form-group">
					<label for="param-type">Type</label>
					<select id="param-type" required>
						<option value="color">Color</option>
						<option value="number">Number</option>
						<option value="text">Text</option>
						<option value="boolean">Boolean</option>
						<option value="select">Select</option>
					</select>
				</div>
				<div class="form-group">
					<label for="param-css">CSS Property</label>
					<input type="text" id="param-css" placeholder="e.g., background-color, width, font-size">
					<small>The CSS property this variable will control (optional)</small>
				</div>
				<div class="form-group">
					<label for="param-value">Default Value</label>
					<input type="text" id="param-value" placeholder="e.g., #ffffff or 10px">
				</div>
				<div class="modal-actions">
					<button type="button" class="btn" onclick="closeModal()">Cancel</button>
					<button type="submit" class="btn btn-save">Add Parameter</button>
				</div>
			</form>
		</div>
	</div>

	<!-- NodeCG -->
	<script src="/bower_components/jquery/dist/jquery.min.js"></script>

</body>

</html>
