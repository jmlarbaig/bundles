<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <!-- JQUERY -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>

    <!-- Bootstrap avec version plus récente -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome pour icônes modernes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" type="text/css" href="./js/svg/jquery.svg.css">
    <script type="text/javascript" src="./js/svg/jquery.svg.js"></script>

    <title>Leaderboard</title>

    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/video.css">

    <link rel="stylesheet" href="css/header/header_side.css">
    <link rel="stylesheet" href="css/leaderboard/overlay_side.css">

    <script src="./assets/flag.js" type="text/javascript"></script>

    <script src="./js/wod.js" type="text/javascript"></script>
    <script src="./js/heat.js" type="text/javascript"></script>
    <script src="./js/time.js" type="text/javascript"></script>
    <script src="./js/tools.js" type="text/javascript"></script>
    <script src="./js/style_leaderboard.js" type="text/javascript"></script>
    <script src="./js/static.js" type="text/javascript"></script>
    <script src="./js/dynamic.js" type="text/javascript"></script>

</head>

<body class="screen">
    <div class="backgroundOverlay">

    </div>

    <div class="flex-container">
        <div class="flex-item video-content">
            <video id="video" autoplay muted>
                <source id="sourceVid" src="" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="header">
        <div class="box_logo" style="display: none;">
            <div id="logo" class="logo"></div>
        </div>

        <div class="box_chrono" style="display: none;">
            <div id="chrono" class="chrono"></div>
        </div>

        <div class="box_heat" style="display: none;">
            <div id="heat" class="heat"></div>
        </div>
    </div>
    <!-- 
    <div class="box_svg" id="box_svg" style="display: none;">
        <svg height="1080" width="1920">
            <line x1="80" y1="10" x2="80" y2="100" style="stroke:rgb(213, 213, 213);stroke-width:2" />
            <line x1="80" y1="150" x2="80" y2="970" style="stroke:rgb(213, 213, 213);stroke-width:2" />
            <line x1="80" y1="1050" x2="80" y2="1070" style="stroke:rgb(213, 213, 213);stroke-width:2" />
        </svg>
    </div> -->

    <div class="leaderboards" id="leaderboards" style="display: none;"></div>

    <div class="frame" id="frame"></div>

    <div class="sponsorLogo" id="sponsorLogo"></div>

    <div class="mainSponsor"></div>

    <!-- <div id="mvt" class="text-nowrap text-truncate text-left"></div> -->

    <!-- Template pour la création dynamique des éléments du leaderboard -->
    <template id="athlete-template">
        <div class="athlete">
            <div class="ath">
                <div class="rank"></div>
                <div class="name"></div>
                <div class="score"></div>
                <div class="flag">
                    <div class="box_flag"></div>
                </div>
            </div>
        </div>
    </template>

    <script src="./index.js" type="text/javascript"></script>
</body>

</html>
