<!DOCTYPE html>
<html lang="en">

<head>
	<!-- Required meta tags -->
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Scoring Kairos</title>

	<!-- JQUERY -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>

	<!-- Latest compiled and minified CSS -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css"
		integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">

	<!-- Optional theme -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap-theme.min.css"
		integrity="sha384-6pzBo3FDv/PJ8r2KRkGHifhEocL+1X2rVCTTkUfGk7/0pbek5mMa1upzvWbrUbOZ" crossorigin="anonymous">

	<!-- Latest compiled and minified JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"
		integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd"
		crossorigin="anonymous"></script>

	<!-- Human Parser -->
	<script src="https://cdn.jsdelivr.net/npm/humanparser@2.7.0/index.min.js"></script>

	<!-- local CSS -->
	<link rel="stylesheet" href="../common/css/index.css">
	<link rel="stylesheet" href="../common/css/button.css">
	<link rel="stylesheet" href="css/header.css">
	<link rel="stylesheet" href="css/sk.css">
	<link rel="stylesheet" href="css/confirm.css">
	<link rel="stylesheet" href="css/modal.css">


	<!-- local Assets -->
	<script src="../assets/flag.js" type="text/javascript"></script>

	<!-- local Javascript -->
	<script src="./js/html-elements.js" type="text/javascript"></script>
	<script src="./js/effect.js" type="text/javascript"></script>
	<script src="./js/status.js" type="text/javascript"></script>
	<script src="./js/wod.js" type="text/javascript"></script>

	<script src="../common/js/dynamic.js" type="text/javascript"></script>
	<script src="../common/js/static.js" type="text/javascript"></script>
	<script src="../common/js/tools.js" type="text/javascript"></script>
	<script src="../common/js/time.js" type="text/javascript"></script>

</head>

<body class="nobody">
	<div class="header">
		<div class="box_logo">
			<div id="logo" class="logo"></div>
		</div>
		<div class="box_chrono">
			<div id="chrono" class="chrono"></div>
		</div>

		<div class="box_heat">
			<div id="heat" class="heat"></div>
		</div>

	</div>

	<div>
		<div class="controlHeat">
			<div class="log-button">
				<button type='button' class="info btn" id='reloadWorkouts' onclick="showModal()">Reload
					Workout</button>
			</div>
			<div class="col input-form">
				<label for="workoutsMqtt">Workout Selection</label>
				<select id="workoutsMqtt" class="workouts">
					<option value="0">NO WORKOUT LOADED</option>
				</select>
			</div>
			<div class="col input-form">
				<label for="heatsMqtt">Heat Selection</label>
				<select id="heatsMqtt" class="heat">
					<option value="0">NO HEAT LOADED</option>
				</select>
			</div>
			<div class="col log-button">
				<button type='button' class="danger btn" id='changeHeat' onclick="showModal()">Change Heat</button>
			</div>


			<div class="col box">
				<label>Time Cap Workout</label>
				<div id="timeCapKairos">00:00</div>
			</div>

			<div class="col stateTimer box">
				<label>State Heat</label>
				<div id="stateTimer"></div>
			</div>



			<div class="col box">
				<label>Hours</label>
				<div class="hours">00:00:00</div>
			</div>
			<div class="col log-button">
				<button type='button' class="success btn" id='startChrono' onclick="startChrono()">Start Chrono</button>
			</div>


			<div class="col">
				<label for="countTimer">Count before timer</label>
				<input type="number" id="countTimer" value="11" />
			</div>
			<div class="log-button">
				<button type='button' class="danger btn" id='resetChrono' onclick="showModal()">Reset Chrono</button>
			</div>
		</div>
	</div>

	<div class="leaderboards" id="leaderboards"></div>

	<!-- The Modal -->
	<div id="myModal-Confirm" class="modal-confirm">
		<!-- Modal content -->
		<div class="modal-confirm-content">
			<span class="close">&times;</span>
			<h3>BE CAREFUL</h3>
			<p id="textConfirmation"></p>
			<button class="danger" onclick="closeModal()">NO</button>
			<button class="success" onclick="confirmChoice()">YES</button>
		</div>
	</div>
	<script src='js/confirm.js'></script>
	<script src="../index.js"></script>
	<script src='js/sk.js'></script>

</html>
