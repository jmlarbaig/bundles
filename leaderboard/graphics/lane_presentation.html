    <!-- Définir OrbitControls manuellement depuis la version source -->
    <script>
        // document.getElementById('debug').innerText = "Statut: Three.js chargé, chargement des contrôles...";

        // Définir OrbitControls manuellement
        // Extrait du code source officiel de Three.js OrbitControls
        // Source: https://github.com/mrdoob/three.js/blob/dev/examples/js/controls/OrbitControls.js
        // Mais simplifié pour notre besoin
        THREE.OrbitControls = function (object, domElement) {

            this.object = object;
            this.domElement = (domElement !== undefined) ? domElement : document;

            // Public - API
            this.enabled = true;
            this.target = new THREE.Vector3();
            this.enableDamping = false;
            this.dampingFactor = 0.05;

            // Rotation
            this.enableRotate = true;
            this.rotateSpeed = 1.0;

            // Zoom
            this.enableZoom = true;
            this.zoomSpeed = 1.0;

            this.update = function () {
                // Mise à jour minimale pour la rotation
                if (this.enableDamping) {
                    // Simple implémentation du damping
                }
                return true;
            };
        };

        // document.getElementById('debug').innerText = "Statut: OrbitControls défini";
        console.log('OrbitControls défini globalement:', typeof THREE.OrbitControls);

        // Charger le script principal
        const mainScript = document.createElement('script');
        mainScript.src = 'lane_main.js';
        mainScript.onload = function () {
            // document.getElementById('debug').innerText = "Statut: Script principal chargé";
            console.log('Script principal chargé');
            // Charger les contrôles de perspective
            const perspectiveScript = document.createElement('script');
            perspectiveScript.src = 'perspective-controls.js';
            document.body.appendChild(perspectiveScript);
        };
        document.body.appendChild(mainScript);
    </script>
