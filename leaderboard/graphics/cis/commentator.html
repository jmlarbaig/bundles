<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">


    <!-- JQUERY -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>

    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css"
        integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">

    <!-- Optional theme -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap-theme.min.css"
        integrity="sha384-6pzBo3FDv/PJ8r2KRkGHifhEocL+1X2rVCTTkUfGk7/0pbek5mMa1upzvWbrUbOZ" crossorigin="anonymous">

    <!-- Latest compiled and minified JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"
        integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd"
        crossorigin="anonymous"></script>
    <!-- Human Parser -->
    <script src="https://cdn.jsdelivr.net/npm/humanparser@2.7.0/index.min.js"></script>

    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.1/css/jquery.dataTables.css">

    <script type="text/javascript" charset="utf8"
        src="https://cdn.datatables.net/1.13.1/js/jquery.dataTables.js"></script>
    <script type="text/javascript" charset="utf8"
        src="https://cdn.datatables.net/fixedcolumns/4.2.1/js/dataTables.fixedColumns.min.js"></script>

    <title>Competition Corner Live</title>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.png">



    <!-- local CSS -->
    <link rel="stylesheet" href="../common/css/index.css">
    <link rel="stylesheet" href="css/cis.css">
    <link rel="stylesheet" href="css/confirm.css">
    <link rel="stylesheet" href="css/cumulative.css">
    <link rel="stylesheet" href="css/mvt.css">
    <link rel="stylesheet" href="css/current-mvt.css">
    <link rel="stylesheet" href="css/lane.css">
    <link rel="stylesheet" href="css/name.css">
    <link rel="stylesheet" href="css/pace.css">
    <link rel="stylesheet" href="css/rank.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/modal.css">

    <!-- local Assets -->
    <script src="../assets/flag.js" type="text/javascript"></script>

    <!-- local Javascript -->
    <script src="js/html-elements.js" type="text/javascript"></script>
    <script src="js/status.js" type="text/javascript"></script>
    <script src="js/modal.js" type="text/javascript"></script>
    <script src="js/effect.js" type="text/javascript"></script>

    <script src="../common/js/dynamic.js" type="text/javascript"></script>
    <script src="../common/js/static.js" type="text/javascript"></script>
    <script src="../common/js/tools.js" type="text/javascript"></script>
    <script src="../common/js/heat.js" type="text/javascript"></script>
    <script src="../common/js/time.js" type="text/javascript"></script>

</head>

<body style="background:#0d0d1a;">
    <div class="cis-wrap">
        <div class="header">
            <div class="cis-header-left">

                <!-- Competition Corner Logo — SVG recreation of double chevron + C -->
                <div
                    style="width:40px;height:40px;background:#111;border-radius:8px;border:1px solid #2a2a3a;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <svg width="26" height="28" viewBox="0 0 26 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Top chevron (smaller) -->
                        <polyline points="5,4 13,10 21,4" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round" fill="none" />
                        <!-- Bottom chevron (larger) -->
                        <polyline points="3,9 13,16 23,9" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round" fill="none" />
                        <!-- C letterform -->
                        <path d="M18 24.5 A7 7 0 1 1 18 17" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"
                            fill="none" />
                    </svg>
                </div>

                <div class="cis-info-header-left">
                    <div class="cis-event-name"></div>
                    <div class="cis-heat-info"></div>
                </div>
            </div>

            <div class="cis-header-center">
                <div class="cis-live-dot"></div>
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <div id="chrono" class="chrono"></div>
                    <div id="cis-clock-label" class="cis-clock-label"></div>
                </div>
            </div>
            <div class="cis-header-right">
                <div class="cis-stat">
                    <div class="cis-stat-val" id="finished-count" style="color:#3ecf6a;"></div>
                    <div class="cis-stat-label">Finished</div>
                </div>
                <div class="cis-stat-divider"></div>
                <div class="cis-stat">
                    <div class="cis-stat-val" id="active-count" style="color:#4a9eff;"></div>
                    <div class="cis-stat-label">Active</div>
                </div>
                <div class="cis-stat-divider"></div>
                <div class="cis-stat">
                    <div class="cis-stat-val" id="athletes-count"></div>
                    <div class="cis-stat-label">Athletes</div>
                </div>
            </div>
        </div>

        <div class="leaderboards" id="leaderboards"></div>

        <div id="myModal" class="modal"></div>

        <div
            style="background:#0d0d1a;border-top:1px solid #1a1a2e;padding:6px 16px;display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:8px;">
                <svg width="14" height="15" viewBox="0 0 26 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <polyline points="5,4 13,10 21,4" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" fill="none" />
                    <polyline points="3,9 13,16 23,9" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" fill="none" />
                    <path d="M18 24.5 A7 7 0 1 1 18 17" stroke="#e8e8f0" stroke-width="2.5" stroke-linecap="round"
                        fill="none" />
                </svg>
                <div
                    style="font-size:10px;font-weight:600;color:#e8e8f0;letter-spacing:.08em;text-transform:uppercase;">
                    Pulse ·
                    Commentator Information System · Competition Corner Live</div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
                <div
                    style="display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:#e8e8f0;letter-spacing:.06em;text-transform:uppercase;">
                    <div style="width:6px;height:6px;border-radius:50%;background:#4a9eff;"></div>Lane — fixed
                </div>
                <div
                    style="display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:#e8e8f0;letter-spacing:.06em;text-transform:uppercase;">
                    <div style="width:6px;height:6px;border-radius:50%;background:#f0c040;"></div>Rank — live
                </div>
                <div
                    style="display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:#e8e8f0;letter-spacing:.06em;text-transform:uppercase;">
                    <div style="width:6px;height:6px;border-radius:50%;background:#3ecf6a;"></div>⚡ Fastest
                </div>
                <div
                    style="display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:#e8e8f0;letter-spacing:.06em;text-transform:uppercase;">
                    <div style="width:6px;height:6px;border-radius:50%;background:#f0a030;"></div>Finished
                </div>
            </div>
        </div>
    </div>



    <script src="../index.js" type="text/javascript"></script>


</body>

</html>
