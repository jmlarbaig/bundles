<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Setup Dashboard</title>
	<link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&display=swap">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
	<link rel="stylesheet" href="/bundles/configuration/dashboard/css/configuration.css">
	<script src="./js/setup.js"></script>
</head>

<body>

	<div class="shell">

		<!-- TOPBAR -->
		<header class="topbar">
			<div class="topbar-logo">SETUP<span>/</span>PANEL</div>
			<div class="topbar-sep"></div>

			<div class="dash-selector-wrap">
				<span class="dash-label">Setup</span>
				<select id="dashboard-select">
					<option value="">— select —</option>
				</select>
			</div>

			<div class="status-pill">
				<div class="status-dot"></div>
				<span>LIVE</span>
			</div>

			<div class="topbar-actions">
				<button class="btn repTarget" onclick="refreshScoreToBeat()">Refresh Score To Beat</button>
				<button class="btn btn-danger" onclick="resetConfig()">RESET</button>
				<button class="btn" onclick="exportConfig()">EXPORT</button>
				<button class="btn btn-save" onclick="Actualiser()">APPLY</button>
			</div>
		</header>

		<!-- SIDEBAR -->
		<nav class="sidebar" id="sidebar">
			<div class="empty-state" style="height:100%">
				<div class="empty-icon">⬡</div>
				<span>Select a setup</span>
			</div>
		</nav>

		<!-- MAIN -->
		<main class="main" id="main">
			<div class="empty-state">
				<div class="empty-icon">◈</div>
				<span>No setup selected</span>
			</div>
		</main>

	</div>

	<!-- Bottom bar -->
	<div class="bottombar">
		<div class="bar-item">
			<div class="bar-dot"></div>
			<span>NODECG</span>
		</div>
		<div class="bar-item">
			<span id="bar-changes">0 changes</span>
		</div>
		<div class="bar-item" style="margin-left:auto">
			<span id="bar-section">—</span>
		</div>
	</div>

	<!-- Toast -->
	<div class="toast" id="toast"></div>

	<!-- NodeCG -->
	<script src="/bower_components/jquery/dist/jquery.min.js"></script>

</body>

</html>
